# Brings up the whole stack: `docker compose up --build`.
# Frontend: http://localhost:5173   Backend API: http://localhost:5088
services:
  backend:
    build: ./backend
    ports:
      - "5088:8080"
    environment:
      - ConnectionStrings__Default=Data Source=/data/app.db
      - Cors__AllowedOrigins__0=http://localhost:5173
      # Dev-only signing key; override with a real secret outside local use.
      - Jwt__Key=docker-compose-dev-signing-key-change-me-please-0123456789
    volumes:
      - tasks-db:/data

  frontend:
    build:
      context: ./frontend
      args:
        # The browser reaches the backend at its host-exposed URL.
        VITE_API_URL: http://localhost:5088
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  tasks-db:
